MSFT:
  core_question: Can Microsoft become the enterprise authority-control layer for governed agents?
  metrics:
    - id: azure_growth
      name: Azure growth
      type: fundamental
      cadence: quarterly
      source: earnings_release
      direction: up
    - id: agent_governance_evidence
      name: Agent governance and write-permission evidence
      type: qualitative
      cadence: monthly
      source: filings_news_product_docs
      direction: stronger
    - id: production_write_permission
      name: Production write-permission adoption evidence
      type: qualitative
      cadence: monthly
      source: filings_news_product_docs
      direction: stronger
    - id: security_attach
      name: Security and identity attach evidence
      type: fundamental_or_qualitative
      cadence: quarterly
      source: earnings_release_and_security_blog
      direction: stronger
  watch_rule: No fresh evidence on production write-permission adoption.
  next_action:
    type: evidence_check
    metric_id: production_write_permission
    priority: high
    due: 2026-08-22
    question: Look for evidence of Agent 365 production write-permission adoption.
    success_condition: Official disclosure, customer case study, or product documentation shows agents executing governed production actions.
  falsifier:
    - Enterprise agents remain draft-only and fail to gain production write permissions.

GOOGL:
  core_question: Can Google turn TPU, DeepMind, Cloud, Search, and Workspace into a cost advantage?
  metrics:
    - id: google_cloud_revenue_margin
      name: Google Cloud revenue and margin
      type: fundamental
      cadence: quarterly
      source: earnings_release
      direction: up
    - id: tpu_product_evidence
      name: TPU and Ironwood product evidence
      type: qualitative
      cadence: monthly
      source: company_blog_and_cloud_docs
      direction: stronger
    - id: search_pressure
      name: Search disruption pressure
      type: qualitative
      cadence: monthly
      source: filings_news_product_docs
      direction: lower
  watch_rule: Cloud margin fails to show TPU or capex leverage.
  next_action:
    type: quarterly_review
    metric_id: google_cloud_revenue_margin
    priority: high
    due: 2026-08-22
    question: Check whether TPU and capex advantage appears in Cloud margin or AI revenue quality.
    success_condition: Cloud margin, product disclosure, or customer evidence supports TPU-driven cost leverage.
  falsifier:
    - Search economics weaken while TPU differentiation fails to offset capex pressure.

AVGO:
  core_question: Can Broadcom keep scaling hyperscaler ASIC and networking exposure?
  metrics:
    - id: ai_semiconductor_revenue
      name: AI semiconductor revenue
      type: fundamental
      cadence: quarterly
      source: earnings_release
      direction: up
    - id: customer_concentration
      name: Customer concentration clues
      type: qualitative
      cadence: quarterly
      source: filings_and_transcripts
      direction: lower
    - id: networking_attach
      name: Networking attach evidence
      type: qualitative
      cadence: quarterly
      source: earnings_transcript
      direction: stronger
  watch_rule: AI semiconductor growth depends on too few customers.
  next_action:
    type: quarterly_review
    metric_id: ai_semiconductor_revenue
    priority: medium
    due: 2026-08-22
    question: Check whether AI semiconductor growth is broadening beyond a small customer set.
    success_condition: Management discloses durable ASIC or networking demand across multiple hyperscalers.
  falsifier:
    - Custom silicon wins do not translate into durable networking or platform pull-through.

